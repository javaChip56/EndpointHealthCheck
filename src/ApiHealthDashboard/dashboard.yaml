dashboard:
  refreshUiSeconds: 10
  requestTimeoutSecondsDefault: 10
  showRawPayload: true
  notifications:
    enabled: true
    notifyOnRecovery: true
    cooldownMinutes: 60
    minimumPriority: Normal
    subjectPrefix: '[ApiHealthDashboard]'
    to:
      - 'ops@example.com'
    cc:
      - 'teamlead@example.com'

endpointFiles:
  - endpoints/orders-api.yaml
  - endpoints/billing-api.yaml
